server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://apis.google.com https://*.firebaseapp.com; style-src 'self' 'unsafe-inline' blob:; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' blob: https://*.firebaseio.com https://accounts.google.com https://api.anthropic.com https://api.lemonfox.ai https://api.openai.com https://cdn-lfs-us-1.huggingface.co https://cdn-lfs.huggingface.co https://firebasestorage.googleapis.com https://firestore.googleapis.com https://generativelanguage.googleapis.com https://huggingface.co https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://texttospeech.googleapis.com https://www.googleapis.com;";

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle assets explicitly to prevent index.html fallback for missing or malformed files
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://apis.google.com https://*.firebaseapp.com; style-src 'self' 'unsafe-inline' blob:; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' blob: https://*.firebaseio.com https://accounts.google.com https://api.anthropic.com https://api.lemonfox.ai https://api.openai.com https://cdn-lfs-us-1.huggingface.co https://cdn-lfs.huggingface.co https://firebasestorage.googleapis.com https://firestore.googleapis.com https://generativelanguage.googleapis.com https://huggingface.co https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://texttospeech.googleapis.com https://www.googleapis.com;";
    }

    # Cache control for static assets (matching extensions)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://apis.google.com https://*.firebaseapp.com; style-src 'self' 'unsafe-inline' blob:; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' blob: https://*.firebaseio.com https://accounts.google.com https://api.anthropic.com https://api.lemonfox.ai https://api.openai.com https://cdn-lfs-us-1.huggingface.co https://cdn-lfs.huggingface.co https://firebasestorage.googleapis.com https://firestore.googleapis.com https://generativelanguage.googleapis.com https://huggingface.co https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://texttospeech.googleapis.com https://www.googleapis.com;";
    }
    # Firebase Auth Proxy
    location /__/auth/ {
        proxy_pass https://${FIREBASE_AUTH_DOMAIN};
        proxy_set_header Host ${FIREBASE_AUTH_DOMAIN};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
