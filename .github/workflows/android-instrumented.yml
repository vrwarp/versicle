name: Android Instrumented Tests (emulator)

# L3 media-notification tests run on a REAL emulator, which needs /dev/kvm — so this
# CANNOT run inside Dockerfile.android (the `./gradlew test` job in android.yml). It is a
# separate bare-runner job. Advisory while stabilizing: the emulator step is
# continue-on-error, so flaky emulator boots don't block PRs; the required gate stays
# android.yml's `./gradlew test` (the L1 Robolectric layer).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'android/**'
      - 'packages/capacitor-media-session/**'
      - '.github/workflows/android-instrumented.yml'

# Avoid stacking emulator jobs on rapid pushes.
concurrency:
  group: android-instrumented-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented:
    # MUST be a bare runner (not `container:`) — the KVM-accelerated emulator is unavailable
    # inside a container on GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install JS deps
        run: npm ci

      - name: Compiled dictionary (if not committed)
        run: test -f public/dict/cedict.json || npm run compile-dict

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-google_apis-x86_64

      - name: Instrumented media-notification tests
        # Advisory: do not fail the PR on emulator flake while this lane stabilizes.
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          # FULL google_apis image — NOT *_atd: ATD images disable SystemUI, which breaks
          # UiDevice.openNotification() and the rendered media notification.
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          # TTS audio is produced in the WebView; Media3 only needs MediaSession + Notification +
          # FGS, so -noaudio is fine. Locale defaults to en-US on the image.
          script: cd android && ./gradlew :jofr-capacitor-media-session:connectedDebugAndroidTest

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports
          path: packages/capacitor-media-session/android/build/reports/androidTests/
          retention-days: 5
