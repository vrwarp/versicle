name: Docker

# Push-to-main and tag pushes only. A merged PR already fires the push
# trigger with the same merge commit, so a pull_request(closed) trigger
# would build the identical image a second time, concurrently — and the
# two builds race on the shared GHA buildx cache scope ("failed to
# reserve cache" killed the merged-PR twin on every merge).
on:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Image Name
        run: |
          if [ -n "${DOCKER_USERNAME}" ]; then
            echo "IMAGE_NAME=${DOCKER_USERNAME}/${REPO_NAME}" >> $GITHUB_ENV
          else
            echo "IMAGE_NAME=${GITHUB_REPOSITORY}" >> $GITHUB_ENV
          fi
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
