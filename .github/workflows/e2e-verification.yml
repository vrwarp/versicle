# Docker/Playwright E2E lane. Desktop + mobile run on every PR (informational
# checks — not required by branch protection); webkit remains nightly/manual
# only — it runs serially (--workers=1) and its TTS journeys are too
# timing-sensitive for a PR gate (see run_verification.sh).
#
# Uses the existing run_verification.sh flow: builds Dockerfile.verification,
# serves the production build via `vite preview` inside the container, and
# runs the Playwright suite (verification/*.spec.ts) against it.
name: E2E verification

on:
  workflow_dispatch:
  pull_request:
  schedule:
    # Nightly at 09:23 UTC (off the top of the hour to dodge GH cron load).
    - cron: '23 9 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # WebKit is nightly/manual only, so PR runs get just desktop+mobile.
        # (jobs.<id>.if cannot see the matrix context, hence the dynamic
        # matrix instead of a per-leg condition.)
        project: ${{ fromJSON(github.event_name == 'pull_request' && '["desktop", "mobile"]' || '["desktop", "mobile", "webkit"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Run verification suite (Docker)
        # run_verification.sh builds the versicle-verify image, mounts
        # verification/screenshots, and serializes WebKit automatically.
        run: ./run_verification.sh --project=${{ matrix.project }}
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-screenshots-${{ matrix.project }}
          path: verification/screenshots/
          retention-days: 14
      - name: Upload Playwright traces
        # test-results/ (mounted out of the container by run_verification.sh)
        # carries the retry traces and error context that make failures
        # diagnosable offline via `npx playwright show-trace`. Failure-only:
        # the trace zips are large.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 14
          if-no-files-found: warn
