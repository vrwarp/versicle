# EXPERIMENTAL — Docker/Playwright E2E lane. Deliberately NOT a PR gate:
# the Dockerized suite has not been verified green on hosted runners
# (plan/overhaul/analysis/testing-verification.md debt #11: the old
# visual-verification.yml ran it per-PR with three cold Docker builds and
# without CI=1, and nothing consumed its artifacts). It runs nightly and on
# demand until it is proven stable enough to promote into ci.yml.
#
# Uses the existing run_verification.sh flow: builds Dockerfile.verification,
# serves the production build via `vite preview` inside the container, and
# runs the Playwright suite (verification/*.spec.ts) against it.
name: E2E verification (experimental)

on:
  workflow_dispatch:
  schedule:
    # Nightly at 09:23 UTC (off the top of the hour to dodge GH cron load).
    - cron: '23 9 * * *'

jobs:
  e2e:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        project: [desktop, mobile, webkit]
    steps:
      - uses: actions/checkout@v4
      - name: Run verification suite (Docker)
        # run_verification.sh builds the versicle-verify image, mounts
        # verification/screenshots, and serializes WebKit automatically.
        run: ./run_verification.sh --project=${{ matrix.project }}
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-screenshots-${{ matrix.project }}
          path: verification/screenshots/
          retention-days: 14
