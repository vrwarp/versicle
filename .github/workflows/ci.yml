# Phase 0 PR gate (plan/overhaul/README.md §5 P0): lint, typecheck (app +
# test + e2e code via tsc -b project references), sharded vitest, production
# build, worker-chunk purity, dependency-cruiser ratchet, license gate.
#
# Conventions (do not regress):
#   - Node comes from .nvmrc — never hardcode a version here.
#   - npm ci only. `npm install` in CI re-resolves git deps and can test a
#     different tree than the lockfile (this exact failure mode existed in
#     the retired npm-test.yml).
#   - The Docker/Playwright E2E lane lives in e2e-verification.yml:
#     desktop+mobile run per-PR (informational, not branch-protected),
#     webkit stays nightly + manual.
name: CI

on:
  push:
    # antigravity is the integration branch; main kept during transition
    # (several legacy workflows still reference it).
    branches: [antigravity, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Lint, typecheck, boundaries, licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck (app + tests + e2e)
        run: npx tsc -b
      - name: Dependency boundaries (warn-mode ratchet)
        # All boundary rules are severity "warn" (Phase 0) so plain depcruise
        # exits 0; the check fails only if a rule's violation count exceeds
        # the committed baseline (.dependency-cruiser-baseline.json).
        run: npm run depcruise:check
      - name: Lint-debt ratchet (any / eslint-disable)
        # P9 ratchet: production `as any` / `: any` / eslint-disable counts
        # may only decrease; the irreducible rest is justified per entry in
        # lint-debt-allowlist.json.
        run: npm run lintdebt:check
      - name: License gate
        # Fails on production deps with licenses outside the GPL-3.0-compatible
        # allowlist and on incomplete third-party/inventory.json entries.
        run: npm run licenses:check
      - name: Dead-code gate (knip)
        # P9 deletion audit made the tree knip-clean: unused files, exports,
        # types, and dependencies fail the build. Intentional keeps carry an
        # explicit ignore + reason in knip.jsonc (or a @public JSDoc tag).
        run: npm run knip

  test:
    name: Vitest (shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run vitest shard
        run: npx vitest run --shard=${{ matrix.shard }}/2

  build:
    name: Build + worker-chunk purity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Compile dictionary (vendored snapshot, checksum-verified)
        # Compiles scripts/cedict-source.zip — the CC-CEDICT snapshot vendored
        # in-repo and pinned by scripts/cedict.lock.json. Fully OFFLINE and
        # reproducible: no mdbg.net download at build time, so MDBG's ~daily
        # export rotation can no longer break CI. Upgrades are a deliberate,
        # reviewed PR (.github/workflows/update-dict.yml). No cache needed —
        # compiling the committed zip is deterministic and ~2s.
        run: npm run compile-dict
      - name: Build (tsc -b && vite build)
        run: npm run build
      - name: Worker-chunk purity (C12)
        # Reuses dist/ from the build step above; asserts the TTS worker
        # bundle contains no zustand/yjs/src-store code.
        run: npm run check:worker-chunk -- --skip-build

  emulator:
    name: Sync backend contract (firebase emulator)
    # Drives the REAL FirestoreBackend + the y-cinder provider against the
    # auth/firestore/storage emulator trio (firebase.json). This is the only
    # gate that exercises y-cinder's overhauled wire format end-to-end; the
    # suites skipIf(!emulatorUp) in the plain `test` job, so they only run here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: actions/setup-java@v4
        # The firestore + storage emulators are JVM processes.
        with:
          distribution: temurin
          java-version: '21'
      - name: Install dependencies
        run: npm ci
      - name: Sync backend emulator contract (real FirestoreBackend + y-cinder)
        run: npm run test:emulator
