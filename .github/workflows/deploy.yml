name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore compiled dictionary
        # cedict.json left git at Phase 6 PR-12: built from the release
        # pinned in scripts/cedict.lock.json, cached by its hash.
        id: dict-cache
        uses: actions/cache@v4
        with:
          path: public/dict
          key: cedict-${{ hashFiles('scripts/cedict.lock.json') }}

      - name: Compile dictionary (pinned release, checksum-verified)
        if: steps.dict-cache.outputs.cache-hit != 'true'
        run: npm run compile-dict

      - name: Build
        run: npm run build
        env:
          VITE_BASE: ${{ vars.VITE_BASE_GITHUB_PAGES || '/' }}

      - name: SPA Redirect
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
