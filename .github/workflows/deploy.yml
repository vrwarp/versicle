name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs — we
# want production deployments to complete. Cancelling a deploy mid-flight (e.g.
# when a second merge lands seconds after the first) can leave the Pages backend
# in a state where the superseding deployment fails with "Deployment failed, try
# again later." Matches GitHub's official Pages workflow recommendation.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile dictionary (vendored snapshot, checksum-verified)
        # cedict.json left git at Phase 6 PR-12; compiled offline from the
        # CC-CEDICT snapshot vendored in-repo (scripts/cedict-source.zip,
        # pinned by scripts/cedict.lock.json). No mdbg.net download — upgrades
        # land via the reviewed monthly PR (.github/workflows/update-dict.yml).
        run: npm run compile-dict

      - name: Build
        run: npm run build
        env:
          VITE_BASE: ${{ vars.VITE_BASE_GITHUB_PAGES || '/' }}

      - name: SPA Redirect
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
