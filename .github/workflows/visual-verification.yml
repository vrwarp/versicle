name: Visual Verification

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - project: desktop
            workers: ""
          - project: mobile
            workers: ""
          - project: webkit
            workers: "--workers=1"
    
    steps:
      - uses: actions/checkout@v4

      # 1. Build the Docker Image (includes deps, build, etc.)
      - name: Build Test Container
        run: docker build -t versicle-verify -f Dockerfile.verification .

      # 2. Run Verification (Mounts volume to get artifacts)
      - name: Run Verification Suite
        run: |
          mkdir -p verification/screenshots
          docker run --rm \
            -v ${{ github.workspace }}/verification/screenshots:/app/verification/screenshots \
            versicle-verify --project=${{ matrix.project }} ${{ matrix.workers }}

      # 3. Upload Screenshots as Artifacts
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-screenshots-${{ matrix.project }}
          path: verification/screenshots/
          retention-days: 14
